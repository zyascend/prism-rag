models:
  colpali: "vidore/colpali-v1.3"
  colqwen2: "vidore/colqwen2-v1.0"
  bge_embedding: "BAAI/bge-large-en-v1.5"
  bge_reranker: "BAAI/bge-reranker-large"
  zerank_reranker: "zeroentropy/zerank-2-reranker"
  llm: "qwen2:7b"

embedding:
  bge_dim: 1024
  bge_device: "auto"
  colpali_device: "auto"
  colpali_batch_size: 4  # 编码 batch size（GPU 24GB 可调到 8；ColQwen2-2B 可调 8-16）

retrieval:
  bm25_k: 20
  dense_k: 20
  visual_k: 20
  rrf_k: 60
  rerank_k: 5
  context_compression_ratio: 0.4      # BGE 句级 cosine 过滤保留比（1.0 = 不压缩）
  rerank_score_reject_threshold: 0.0  # 置信度阈值（0 = 禁用，建议 0.3）
  # Visual 按需路由（Boot-B）：默认关闭，保证 Boot-A 黄金消融与历史可比
  visual_routing:
    enabled: false                    # true 时对 use_visual=True 的请求再按 mode 决策
    mode: heuristic                   # heuristic | always | never

# 生成侧上下文过滤（Boot-B）；默认 bge = 现状
context_filter:
  mode: bge                           # off | bge | llm | bge_then_llm

# Self-RAG Gate2（生成后忠实性门）；默认关闭，消融/线上显式打开
generation:
  # true：RAGAS/E2E 走 Generator±Gate2（与 /ask 对齐）；云上 A/B 两臂均应开
  eval_via_generator: false
  self_rag:
    enabled: false                    # true 时 /ask 与 eval_via_generator 路径走 Gate2
    mode: gate2_only                  # MVP 固定；预留 gate1_and_gate2
    judge_model: null                 # null = 与主生成 model 相同
    faith_threshold: 0.8
    max_generate_attempts: 2          # 含首次生成
    on_fail: regenerate_then_abstain  # abstain | regenerate_then_abstain
    gate_timeout_ms: 8000
    on_judge_error: degrade_pass      # degrade_pass | abstain
    verdict_mode: whole_answer        # whole_answer（claim_level 预留）


storage:
  pgvector:
    host: "localhost"
    port: 5432
    dbname: "prismrag"
    user: "prismrag"
    password: "prismrag"
  faiss:
    # 索引命名: <model_id>-<corpus_version>.faiss
    # 可通过 make fetch-indexes 拉取预编码 Release artifact
    index_path: "indexes/colpali-v1.3-vidore-industrial.faiss"
    id_map_path: "indexes/colpali-v1.3-vidore-industrial-ids.npy"
    colqwen2_index_path: "indexes/colqwen2-v1.0-vidore-industrial.faiss"
    colqwen2_id_map_path: "indexes/colqwen2-v1.0-vidore-industrial-ids.npy"
    index_type: "flat"  # "flat" 精确 | "hnsw" HNSW 预筛加速 (macOS FAISS bug, Linux OK)
    hnsw_m: 32

vidore:
  dataset_name: "vidore/vidore_v3_industrial"
  split_corpus: "test"
  split_queries: "test"
  split_qrels: "test"
  num_pages: 5244

observability:
  log_level: "INFO"
  log_file: "logs/app.jsonl"
  trace_enabled: true
  dashboard_enabled: true
  trace_persist_path: "logs/api_traces.jsonl"  # 单条 Trace 磁盘持久化（"" = 关闭，仅内存）
  alerting:
    latency_p95_threshold_ms: 5000
    recall_at_5_min: 0.5
    faithfulness_min: 0.6
    rerank_score_min: 0.0        # 最低 rerank_score 告警阈值（0 = 暂不启用）
    context_relevancy_min: 0.05  # Context Relevance 最低阈值

cache:
  enabled: true                # 全局开关：是否启用检索缓存（L3 结果缓存等）
  max_size: 2048               # 内存 LRU 容量（条目数）
  ttl_seconds: 0               # 0 = 仅依赖 index_version 盐失效；>0 仅作跨进程异常兜底
