# config/models.local-dev.yaml
# 本地 demo 演示配置：真 PDF 走 MinerU + 小语料开 Visual（ColQwen2）
#
# 依赖：
#   - mineru CLI（PATH 中可执行）；未安装时 parser 会告警并降级 simple
#   - ColQwen2 权重（HF cache，首次会加载）
#   - pgvector（make db）
#
# 启动：
#   export CONFIG_PROFILE=local-dev
#   PYTHONPATH=. .venv/bin/python scripts/run_api.py

ingestion:
  parser: mineru
  # 演示工业 PDF 时可开图注锚点（需 MinerU image 块）
  image_caption_chunks: true

retrieval:
  use_visual: true
  use_rerank: true

embedding:
  # 与云上 283q 主结论 visual backbone 对齐；本地 demo 数据量小可承受
  visual_backend: colqwen2

storage:
  faiss:
    # 本地 demo 独立索引，勿与 ViDoRe 全量工业 FAISS 混写
    index_path: indexes/local-demo-colqwen2.faiss
    id_map_path: indexes/local-demo-colqwen2-ids.npy
    colqwen2_index_path: indexes/local-demo-colqwen2.faiss
    colqwen2_id_map_path: indexes/local-demo-colqwen2-ids.npy

llm:
  # SenseNova 配额易 429；本地 demo 默认走 Ollama（OpenAI 兼容）
  # 需先: ollama serve && ollama list（已有 qwen2:7b 即可）
  base_url: http://127.0.0.1:11434/v1
  api_key: ollama
  model: qwen2:7b
