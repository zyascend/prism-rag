id: claim_verification
description: RAGAS Faithfulness - 判断声明是否被上下文支持（ragas_metrics.py）
versions:
  - version: 1
    created_at: "2026-07-18"
    author: yang
    changelog: "初始版本，从 ragas_metrics.py CLAIM_VERIFICATION_PROMPT 迁移，文本零改动"
    active: true
    template: |-
      Determine whether the following claim is DIRECTLY SUPPORTED by the given context.
      Answer ONLY with YES or NO.

      Context:
      {context}

      Claim: {claim}

      Is this claim directly supported by the context? (YES/NO)
