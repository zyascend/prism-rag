id: ragas_generation
description: RAGAS 评测用生成 prompt（ragas_metrics.py GENERATION_PROMPT）
versions:
  - version: 1
    created_at: "2026-07-18"
    author: yang
    changelog: "初始版本，从 ragas_metrics.py GENERATION_PROMPT 迁移，文本零改动"
    active: true
    template: |-
      You are a helpful assistant for industrial document QA.
      Answer the question based ONLY on the provided context.
      If the context does not contain enough information, say "I cannot answer this question based on the available documents."
      Do NOT make up information.

      Context:
      {context}

      Question: {question}

      Answer:
