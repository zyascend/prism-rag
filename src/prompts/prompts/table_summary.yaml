id: table_summary
description: 表格自然语言摘要（table_summarizer.py）
versions:
  - version: 1
    created_at: "2026-07-18"
    author: yang
    changelog: "初始版本，从 table_summarizer.py _TABLE_SUMMARY_PROMPT 迁移，文本零改动（保留尾换行；原首句为续行拼接的单行）"
    active: true
    # 使用 | 保留结尾单个换行（原常量以 {table}\n 结尾）；首句为单物理行，勿换行。
    template: |
      You are a precise technical writer. Summarize the following markdown table into 1-3 factual sentences that describe: (1) what the table is about, (2) its columns, and (3) any notable rows or extreme values. Do NOT invent data not present in the table. Output only the summary, no preamble.

      Table:
      {table}
  - version: 2
    created_at: "2026-07-23"
    author: yang
    changelog: "上下文感知摘要：可选 Surrounding context 消歧章节/工况；仍禁止编造表中不存在的数字。仅当 table_summary_context_enabled 且 context 非空时由 TableSummarizer 选用。"
    active: false
    template: |
      You are a precise technical writer. Summarize the following markdown table into 1-3 factual sentences that describe: (1) what the table is about, (2) its columns, and (3) any notable rows or extreme values.

      Rules:
      - Ground every fact in the table body. Do NOT invent numbers, units, or row values not present in the table.
      - Use Surrounding context only to disambiguate what the table is for (section, caption, operating condition). Do not copy context claims that contradict the table.
      - Output only the summary, no preamble.

      Surrounding context:
      {context}

      Table:
      {table}
