id: relevancy_fallback
description: RAGAS Answer Relevancy - 嵌入不可用时的 LLM 直接评分 fallback（ragas_metrics.py）
versions:
  - version: 1
    created_at: "2026-07-18"
    author: yang
    changelog: "初始版本，从 ragas_metrics.py _RELEVANCY_FALLBACK_PROMPT 迁移，文本零改动"
    active: true
    template: |-
      On a scale of 0.0 to 1.0, how relevant is the following ANSWER to the QUESTION?
      Consider: does the answer directly address the question, or is it tangential?
      Reply with ONLY a number between 0.0 and 1.0.

      Question: {question}
      Answer: {answer}

      Relevance score:
